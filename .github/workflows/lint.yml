name: lint

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    container: ghcr.io/gw0/claude-cage:main
    steps:
      - uses: actions/checkout@v4
      - name: Run fmt
        run: make fmt
      - name: Check for uncommitted changes
        run: git diff --exit-code
